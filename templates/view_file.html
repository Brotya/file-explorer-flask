<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View File - {{ file_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>File: {{ file_name }}</h1>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <a href="{{ url_for('index', dir=current_dir) }}" class="btn-back">← Back to Explorer</a>

        <form method="POST" action="{{ url_for('write_file') }}">
            <input type="hidden" name="current_dir" value="{{ current_dir }}">
            <input type="hidden" name="file_path" value="{{ file_path }}">
            <textarea name="content" rows="20">{{ content }}</textarea>
            <button type="submit">Save File</button>
        </form>
    </div>
</body>
</html>
